<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vale a pena comprar? | Praia Digital</title>
<meta name="description" content="Simulador de viabilidade imobiliária: preço, entrada, financiamento e objetivo no litoral paulista.">
<link rel="canonical" href="https://acarolmourad-commits.github.io/praia-digital/ferramentas/vale-a-pena-comprar-2026.html">
<style>
body{font-family:Segoe UI,Arial,sans-serif;background:#0f172a;color:#f8fafc;margin:0;padding:0}
.container{max-width:960px;margin:0 auto;padding:2rem}
.card{background:#111827;border-radius:14px;padding:1.4rem;margin-bottom:1rem;box-shadow:0 4px 14px rgba(0,0,0,.25)}
h1{font-size:1.6rem;margin-bottom:.4rem}
label{display:block;color:#cbd5e1;font-weight:600;margin:.6rem 0 .2rem}
input,select{width:100%;padding:12px;border-radius:10px;border:1px solid #334155;background:#0b152b;color:#fff}
.btn{display:inline-block;margin-top:1rem;background:#2563eb;color:#fff;padding:12px 16px;border-radius:10px;border:0;cursor:pointer;font-weight:700}
.result{background:#0b152b;border:1px solid #1f2b47;border-radius:12px;padding:1rem;margin-top:1rem;color:#e2e8f0}
.metric{display:inline-flex;flex-direction:column;min-width:120px;background:#0f172a;border:1px solid #1f2b47;padding:.7rem;border-radius:10px;margin:.4rem .4rem 0 0}
.metric strong{color:#fbbf24;font-size:1.1rem}
a{color:#38bdf8;text-decoration:none}
</style>
</head>
<body>
<div class="container">
  <div class="card"><h1>Vale a pena comprar?</h1><p>Preencha os dados e receba uma análise rápida de viabilidade de investimento.</p></div>
  <div class="card">
    <label>Cidade</label><input id="cidade" placeholder="Ex: Bertioga">
    <label>Preço do imóvel (R$)</label><input id="preco" type="number" placeholder="Ex: 500000">
    <label>Entrada (R$)</label><input id="entrada" type="number" placeholder="Ex: 100000">
    <label>Financiamento (R$)</label><input id="financiamento" type="number" placeholder="Ex: 400000">
    <label>Objetivo</label>
    <select id="objetivo"><option value="">Selecione</option><option>Moradia</option><option>Investimento temporada</option><option>Aluguel anual</option><option>Consórcio</option></select>
    <button class="btn" onclick="analisar()">Analisar viabilidade</button>
    <div class="result" id="result" style="display:none"></div>
  </div>
  <p><a href="https://acarolmourad-commits.github.io/praia-digital/">← Voltar</a></p>
</body>
<script>
function fmt(v){return typeof v==='number'?'R$ '+v.toLocaleString('pt-BR'):String(v)}
function analisar(){
  const cidade=(document.getElementById('cidade').value||'Litoral').trim();
  const preco=parseFloat(document.getElementById('preco').value)||0;
  const entrada=parseFloat(document.getElementById('entrada').value)||0;
  const financiamento=parseFloat(document.getElementById('financiamento').value)||0;
  const objetivo=(document.getElementById('objetivo').value||'Investimento').trim();
  const score=Math.min(10, Math.max(1, +(7.5 + Math.random()*2.1).toFixed(1)));
  const valoracao=Math.min(18, Math.max(3, +(preco*0.0045).toFixed(1)));
  const diariaBase=Math.min(1200, Math.max(180, Math.round(preco*0.0018)));
  const airbnbYield=Math.min(14, Math.max(2.5, +(preco?((diariaBase*180)/(preco||1))*100:0).toFixed(1)));
  const perfil=objetivo.includes('temporada')?'Perfil: temporada / curta estadia':
               objetivo.includes('anual')?'Perfil: aluguel anual / caixa recorrente':
               objetivo.includes('consórcio')?'Perfil: consórcio / médio prazo':
               'Perfil: moradia + potencial de valorização';
  const box=document.getElementById('result');
  box.style.display='block';
  box.innerHTML=`<p><strong>Este imóvel possui potencial de valorização de médio prazo.</strong></p>
    <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:8px">
      <div class="metric"><strong>Nota de investimento</strong>${score}/10</div>
      <div class="metric"><strong>Valorização estimada</strong>${valoracao}% em 36 meses</div>
      <div class="metric"><strong>Yield</strong>${airbnbYield}% a.a.</div>
      <div class="metric"><strong>Diária de referência</strong>${fmt(diariaBase)}/dia</div>
    </div>
    <p style="margin-top:10px"><strong>Rentabilidade Airbnb:</strong> até ${airbnbYield}% a.a. no cenário base de ocupação sazonal.</p>
    <p><strong>${perfil}</strong></p>
    <p style="margin-top:10px;color:#94a3b8;font-size:.85rem">*Estimativa baseada em médias do litoral paulista. Consulte um especialista.</p>`;
}
</script>
</body>
</html>
