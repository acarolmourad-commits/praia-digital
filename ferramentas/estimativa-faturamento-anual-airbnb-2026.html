<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estimativa anual de faturamento | Praia Digital</title>
<meta name="description" content="Estimativa anual por imóvel com base em temporadas.">
<link rel="canonical" href="https://acarolmourad-commits.github.io/praia-digital/ferramentas/estimativa-faturamento-anual-airbnb-2026.html">
<style>
body{font-family:Segoe UI,Arial,sans-serif;background:#0f172a;color:#f8fafc;margin:0;padding:0}
.container{max-width:960px;margin:0 auto;padding:2rem}
.card{background:#111827;border-radius:14px;padding:1.4rem;margin-bottom:1rem;box-shadow:0 4px 14px rgba(0,0,0,.25)}
label{display:block;color:#cbd5e1;font-weight:600;margin:.6rem 0 .2rem}
input,select{width:100%;padding:12px;border-radius:10px;border:1px solid #334155;background:#0b152b;color:#fff}
.btn{display:inline-block;margin-top:1rem;background:#2563eb;color:#fff;padding:12px 16px;border-radius:10px;border:0;cursor:pointer;font-weight:700}
.result{background:#0b152b;border:1px solid #1f2b47;border-radius:12px;padding:1rem;margin-top:1rem;color:#e2e8f0}
a{color:#38bdf8;text-decoration:none}
</style>
</head>
<body>
<div class="container">
  <a href="airbnb-admin.html">Área do Administrador Airbnb</a>
  <div class="card"><h1>Estimativa anual de faturamento</h1><p>Estimativa anual por imóvel com base em temporadas.</p></div>
  <div class="card">
<label>Diária média (R$)</label><input id="diaria" type="number" placeholder="Ex: 500">
<label>Dias/mês em alta temporada</label><input id="alta" type="number" placeholder="Ex: 15">
<label>Dias/mês em baixa temporada</label><input id="baixa" type="number" placeholder="Ex: 5">
<label>Ocupação alta (%)</label><input id="occAlta" type="number" placeholder="Ex: 60">
<label>Ocupação baixa (%)</label><input id="occBaixa" type="number" placeholder="Ex: 25">
<button class="btn" onclick="render()">Calcular</button>
<script>
function render(){{
  const diaria=parseN('diaria'), alta=parseN('alta'), baixa=parseN('baixa'), occAlta=parseN('occAlta'), occBaixa=parseN('occBaixa');
  const fatAlta=diaria*alta*(occAlta/100);
  const fatBaixa=diaria*baixa*(occBaixa/100);
  const mensal=fatAlta+fatBaixa;
  const anual=mensal*12;
  const cleanPct=0.12;
  const anualLiquido=anual*(1-cleanPct);
  const text=`<p>Faturamento anual estimado: ${fmt(anual)}</p>
    <p>Estimativa líquida (aprox custos): ${fmt(anualLiquido)}</p>
    <p>Média mensal: ${fmt(mensal)}</p>`;
  showResult(text);
}}
</script>
<div class="result" id="result" style="display:none"></div></div>
</div>
<script>
function fmt(v){return typeof v==='number'?'R$ '+v.toLocaleString('pt-BR',{minimumFractionDigits:2}):String(v)}
function showResult(html){const r=document.getElementById('result');r.style.display='block';r.innerHTML=html}
function parseN(id){const v=document.getElementById(id).value;return v===null||v===undefined?0:parseFloat(v)||0}
</script>
</body>
</html>
