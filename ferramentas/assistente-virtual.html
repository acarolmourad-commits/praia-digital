<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Assistente Virtual para Compradores | Praia Digital</title>
<style>
body{{font-family:Arial,sans-serif;margin:0;padding:0;background:#07112b;color:#fff}}.container{{max-width:880px;margin:0 auto;padding:24px}}.card{{background:#0e214d;border-radius:12px;padding:24px;margin-top:16px}}.btn{{background:#3b82f6;color:white;padding:12px 16px;border-radius:8px;border:0;cursor:pointer;font-size:16px}}input,textarea{{width:100%;padding:10px;border-radius:8px;border:1px solid #334155;background:#0b1a3a;color:#fff;margin-top:8px}}.chat{{background:#0b1a3a;border-radius:8px;padding:16px;margin-top:16px;min-height:120px;color:#e2e8f0}}
</style>
</head>
<body>
<div class="container">
  <h1>Assistente Virtual para Compradores</h1>
  <div class="card">
    <label>Mensagem do comprador</label>
    <textarea id="msg" rows="3">Quero um apartamento perto da praia, até R$ 800 mil.</textarea>
    <button class="btn" onclick="responder()">Responder</button>
    <div class="chat" id="chat"></div>
  </div>
  <p><a href="https://acarolmourad-commits.github.io/praia-digital/" style="color:#9fb3d1">Voltar para a Praia Digital</a></p>
</div>
<script>
function responder(){
  const msg=document.getElementById('msg').value||'';
  const resp=`Olá! Encontrei opções que combinam com seu orçamento. Enviei 3 imóveis com boa avaliação. Quer agendar uma visita virtual?`;
  const box=document.getElementById('chat');
  box.innerHTML=`<strong>Comprador:</strong> ${msg}<br><br><strong>Assistente:</strong> ${resp}`;
}
</script>
</body>
</html>
