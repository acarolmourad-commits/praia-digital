<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Avaliação Automática de Preço | Praia Digital</title>
<style>
body{{font-family:Arial,sans-serif;margin:0;padding:0;background:#07112b;color:#fff}}.container{{max-width:880px;margin:0 auto;padding:24px}}.card{{background:#0e214d;border-radius:12px;padding:24px;margin-top:16px}}.btn{{background:#3b82f6;color:white;padding:12px 16px;border-radius:8px;border:0;cursor:pointer;font-size:16px}}input,select,textarea{{width:100%;padding:10px;border-radius:8px;border:1px solid #334155;background:#0b1a3a;color:#fff;margin-top:8px}}.result{{background:#0b1a3a;border-radius:8px;padding:16px;margin-top:16px;white-space:pre-wrap;color:#e2e8f0}}
</style>
</head>
<body>
<div class="container">
  <h1>Avaliação Automática de Preço de Mercado</h1>
  <div class="card">
    <label>Tipo do imóvel</label>
    <select id="tipo"><option>Apartamento</option><option>Casa</option><option>Cobertura</option><option>Flat</option><option>Studio</option></select>
    <label>Cidade</label>
    <select id="cidade"><option>Santos</option><option>Guarujá</option><option>Ubatuba</option><option>Ilhabela</option><option>Praia Grande</option></select>
    <label>Área (m²)</label>
    <input type="number" id="area" value="90">
    <label>Quartos</label>
    <input type="number" id="quartos" value="2">
    <label>Valor anunciado (R$)</label>
    <input type="number" id="anunciado" value="750000">
    <button class="btn" onclick="avaliar()">Avaliar preço</button>
    <div class="result" id="res"></div>
  </div>
  <p><a href="https://acarolmourad-commits.github.io/praia-digital/" style="color:#9fb3d1">Voltar para a Praia Digital</a></p>
</div>
<script>
function avaliar(){
  const area=Number(document.getElementById('area').value)||90;
  const quartos=Number(document.getElementById('quartos').value)||2;
  const anunciado=Number(document.getElementById('anunciado').value)||0;
  const preco_m2=anunciado/area;
  const referencia=(preco_m2*0.92).toFixed(2);
  const texto=`Relatório de avaliação\nÁrea: ${area}m²\nQuartos: ${quartos}\nValor anunciado: R$ ${anunciado.toLocaleString('pt-BR')}\nPreço/m² informado: R$ ${preco_m2.toFixed(2)}\nReferência de mercado: R$ ${Number(referencia).toLocaleString('pt-BR')}\n\nInsight: valor próximo ao mercado está entre R$ ${Number((preco_m2*0.95).toFixed(2)).toLocaleString('pt-BR')} e R$ ${Number((preco_m2*1.05).toFixed(2)).toLocaleString('pt-BR')}.`;
  document.getElementById('res').textContent=texto;
}
</script>
</body>
</html>
