<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Comparar imóveis no litoral — ferramenta gratuita | Praia Digital</title>
  <meta name="description" content="Ferramenta gratuita para comparar imóveis no litoral paulista e escolher a melhor opção.">
  <link rel="canonical" href="https://acarolmourad-commits.github.io/praia-digital/ferramentas-gratuitas/imobiliarias/comparar-imoveis-litoral.html">
  <style>
    :root{bg:#f8fafc;text:#0f172a;border:#e5e7eb;primary:#2563eb;secondary:#0ea5e9}
    body{font:14px/1.6 system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--text);padding:18px}
    .wrap{max-width:880px;margin:0 auto}
    a{color:var(--primary)}
    label{display:block;margin:10px 0 4px}
    input,select,textarea{width:100%;padding:10px;border:1px solid #e5e7eb;border-radius:12px;background:#fff;color:#0f172a}
    button{background:var(--primary);color:white;border:none;padding:12px 14px;border-radius:14px;margin-top:12px;cursor:pointer;font-weight:800}
    .result{background:#f1f5f9;border:1px solid #e5e7eb;border-radius:12px;padding:14px;margin-top:12px;display:none}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Comparar imóveis no litoral</h1>
    <p>Preencha os dados para ver um comparativo simples.</p>
    <form onsubmit="event.preventDefault();const a=parseInt(document.getElementById('a').value)||0;const b=parseInt(document.getElementById('b').value)||0;const r=document.querySelector('.result');r.style.display='block';r.textContent='Comparativo: imóvel A com '+a+' m² e imóvel B com '+b+' m². Considere também localização, temporada e disponibilidade. ';">
      <label>Imóvel A — área útil</label>
      <input id="a" type="number" placeholder="Ex: 98">
      <label>Imóvel A — quartos</label>
      <input id="aq" type="number" placeholder="Ex: 3">
      <label>Imóvel B — área útil</label>
      <input id="b" type="number" placeholder="Ex: 120">
      <label>Imóvel B — quartos</label>
      <input id="bq" type="number" placeholder="Ex: 4">
      <button type="submit">Comparar</button>
    </form>
    <div class="result"></div>
    <p><a href="/praia-digital/blog/comparar-imoveis-litoral-paulista-2026.html">Guia de comparação</a></p>
  </div>
</body>
</html>
