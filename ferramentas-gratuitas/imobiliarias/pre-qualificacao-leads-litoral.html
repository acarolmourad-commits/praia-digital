<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pré-qualificação de leads para imobiliárias no litoral paulista | Praia Digital</title>
  <meta name="description" content="Ferramenta gratuita para pré-qualificação de leads para imobiliárias no litoral paulista.">
  <link rel="canonical" href="https://acarolmourad-commits.github.io/praia-digital/ferramentas-gratuitas/imobiliarias/pre-qualificacao-leads-litoral.html">
  <style>
    :root{bg:#f8fafc;text:#0f172a;border:#e5e7eb;primary:#2563eb;secondary:#0ea5e9}
    body{font:14px/1.6 system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--text);padding:18px}
    .wrap{max-width:880px;margin:0 auto}
    a{color:var(--primary)}
    label{display:block;margin:10px 0 4px}
    input,select,textarea{width:100%;padding:10px;border:1px solid #e5e7eb;border-radius:12px;background:#fff;color:#0f172a}
    button{background:var(--primary);color:white;border:none;padding:12px 14px;border-radius:14px;margin-top:12px;cursor:pointer;font-weight:800}
    .result{background:#f1f5f9;border:1px solid #e5e7eb;border-radius:12px;padding:14px;margin-top:12px;display:none}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Pré-qualificação de leads</h1>
    <p>Responda 3 perguntas rápidas e receba uma classificação inicial.</p>
    <form onsubmit="event.preventDefault();const or=document.getElementById('or').value||'';const dt=document.getElementById('dt').value||'';const w=document.getElementById('w').value||'';const r=document.querySelector('.result');r.style.display='block';r.textContent='Classificação: orçamento='+or+', data='+dt+', whatsapp='+w+'. Se dois ou mais forem preenchidos, classifique como lead quente para follow-up em 24h.';">
      <label>Orçamento estimado</label>
      <select id="or"><option>Até R$ 300 mil</option><option>R$ 300 mil a R$ 700 mil</option><option>R$ 700 mil a R$ 1,2 milhões</option><option>Acima de R$ 1,2 milhões</option></select>
      <label>Data pretendida</label>
      <input id="dt" type="date">
      <label>Prefere contato por WhatsApp?</label>
      <select id="w"><option>Sim</option><option>Não</option></select>
      <button type="submit">Classificar lead</button>
    </form>
    <div class="result"></div>
    <p><a href="/praia-digital/blog/priorizacao-leads-imobiliaria-litoral-2026.html">Priorização de leads</a></p>
  </div>
</body>
</html>
