<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Calculadora de financiamento para imóveis no litoral paulista | Praia Digital</title>
  <meta name="description" content="Calculadora simples de financiamento para imóveis no litoral paulista.">
  <link rel="canonical" href="https://acarolmourad-commits.github.io/praia-digital/ferramentas-gratuitas/imobiliarias/calculadora-financiamento-litoral.html">
  <style>
    :root{color:#0d1b2a;primary:#4f46e5;secondary:#0ea5e9;accent:#10b981;bg:#f8fafc;text:#0f172a;muted:#475569;border:#e5e7eb}
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font:14px/1.6 system-ui,-apple-system,Segoe UI,Roboto,sans-serif;padding:18px}
    .wrap{max-width:880px;margin:0 auto}
    label{display:block;margin:10px 0 4px}
    input,select{width:100%;padding:10px;border:1px solid #e5e7eb;border-radius:12px;background:#fff;color:#0f172a}
    button{background:var(--primary);color:white;border:none;padding:12px 14px;border-radius:14px;margin-top:12px;cursor:pointer;font-weight:800}
    .result{background:#f1f5f9;border:1px solid #e5e7eb;border-radius:12px;padding:14px;margin-top:12px;display:none}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Calculadora de financiamento</h1>
    <p>Simule sem sair do site.</p>
    <label>Valor do imóvel</label>
    <input id="v" type="number" placeholder="Ex: 800000">
    <label>Entrada (%)</label>
    <input id="e" type="number" placeholder="20">
    <label>Taxa de juros anual (%)</label>
    <input id="j" type="number" placeholder="9">
    <label>Prazo (anos)</label>
    <input id="p" type="number" placeholder="30">
    <button onclick="calcular()">Simular</button>
    <div id="r" class="result"></div>
    <p><a href="/praia-digital/ferramentas-gratuitas/imobiliarias/analise-retorno-temporada-litoral.html">Análise de retorno</a></p>
  </div>
  <script>
    function calcular(){
      const v = parseFloat(document.getElementById('v').value) || 0;
      const e = parseFloat(document.getElementById('e').value) || 0;
      const j = parseFloat(document.getElementById('j').value) || 0;
      const p = parseFloat(document.getElementById('p').value) || 30;
      const principal = v * (1 - e/100);
      const taxa = j/100/12;
      const meses = p*12;
      const parcela = taxa ? (principal * taxa) / (1 - Math.pow(1 + taxa, -meses)) : 0;
      const total = parcela * meses;
      const r = document.getElementById('r');
      r.style.display='block';
      r.innerHTML = `<strong>Parcela estimada:</strong> R$ ${parcela.toFixed(2)}<br><strong>Total aproximado:</strong> R$ ${total.toFixed(2)}`;
    }
  </script>
</body>
</html>
