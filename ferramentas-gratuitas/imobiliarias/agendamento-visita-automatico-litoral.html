<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Agendamento de visita automático para imóveis no litoral | Praia Digital</title>
  <meta name="description" content="Ferramenta gratuita para agendamento de visita automático para imóveis no litoral paulista.">
  <link rel="canonical" href="https://acarolmourad-commits.github.io/praia-digital/ferramentas-gratuitas/imobiliarias/agendamento-visita-automatico-litoral.html">
  <style>
    :root{bg:#f8fafc;text:#0f172a;border:#e5e7eb;primary:#2563eb;secondary:#0ea5e9}
    body{font:14px/1.6 system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--text);padding:18px}
    .wrap{max-width:880px;margin:0 auto}
    a{color:var(--primary)}
    label{display:block;margin:10px 0 4px}
    input,select,textarea{width:100%;padding:10px;border:1px solid #e5e7eb;border-radius:12px;background:#fff;color:#0f172a}
    button{background:var(--primary);color:white;border:none;padding:12px 14px;border-radius:14px;margin-top:12px;cursor:pointer;font-weight:800}
    .result{background:#f1f5f9;border:1px solid #e5e7eb;border-radius:12px;padding:14px;margin-top:12px;display:none}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Agendamento de visita automático</h1>
    <p>Preencha e gere um confirmatório simples.</p>
    <form onsubmit="event.preventDefault();const n=document.getElementById('n').value||'';const i=document.getElementById('i').value||'';const d=document.getElementById('d').value||'';const h=document.getElementById('h').value||'';const r=document.querySelector('.result');r.style.display='block';r.textContent='Confirmado para '+n+': visita em '+i+' no dia '+d+' às '+h+'. Lembrete automático 24h antes incluso.';">
      <label>Nome</label>
      <input id="n" placeholder="Nome do lead">
      <label>Imóvel/endereço</label>
      <input id="i" placeholder="Ex: Apartamento beira-mar, Praia Grande">
      <label>Data</label>
      <input id="d" type="date">
      <label>Horário</label>
      <input id="h" type="time">
      <button type="submit">Confirmar visita</button>
    </form>
    <div class="result"></div>
    <p><a href="/praia-digital/ferramentas-gratuitas/imobiliarias/roteiro-visita-automatico-litoral.html">Roteiro de visita</a></p>
  </div>
</body>
</html>
