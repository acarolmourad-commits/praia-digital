<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Assistente virtual para compradores — ferramenta gratuita | Praia Digital</title>
  <meta name="description" content="Assistente virtual para compradores de imóveis no litoral paulista: dúvidas rápidas sem espera.">
  <link rel="canonical" href="https://acarolmourad-commits.github.io/praia-digital/ferramentas-gratuitas/imobiliarias/assistente-virtual-compradores-litoral.html">
  <style>
    :root{bg:#f8fafc;text:#0f172a;border:#e5e7eb;primary:#2563eb;secondary:#0ea5e9}
    body{font:14px/1.6 system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--text);padding:18px}
    .wrap{max-width:880px;margin:0 auto}
    a{color:var(--primary)}
    label{display:block;margin:10px 0 4px}
    input,select,textarea{width:100%;padding:10px;border:1px solid #e5e7eb;border-radius:12px;background:#fff;color:#0f172a}
    button{background:var(--primary);color:white;border:none;padding:12px 14px;border-radius:14px;margin-top:12px;cursor:pointer;font-weight:800}
    .result{background:#f1f5f9;border:1px solid #e5e7eb;border-radius:12px;padding:14px;margin-top:12px;display:none}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Assistente virtual para compradores</h1>
    <p>Faça uma pergunta típica e receba uma orientação inicial.</p>
    <form onsubmit="event.preventDefault();const d=document.getElementById('d').value||'';const c=document.getElementById('c').value||'';const r=document.querySelector('.result');r.style.display='block';r.textContent='Para compradores em '+c+', eu recomendaria começar por: orçamento, temporada pretendida e preferência entre vista, preço e espaço. Responda com esses 3 pontos para eu indicar um imóvel mais direcionado.';">
      <label>Cidade preferida</label>
      <select id="c">
        <option>Praia Grande</option><option>Caraguatatuba</option><option>Ilhabela</option><option>Ubatuba</option><option>São Sebastião</option><option>Bertioga</option><option>Maresias</option><option>Guarujá</option><option>Iguape</option><option>Cananéia</option>
      </select>
      <label>Dúvida principal</label>
      <textarea id="d" placeholder="Ex: melhor época para temporada, diferença entre temporada alta e baixa..."></textarea>
      <button type="submit">Perguntar ao assistente</button>
    </form>
    <div class="result"></div>
    <p><a href="/praia-digital/blog/funil-vendas-imobiliaria-litoral-2026.html">Funil de vendas</a></p>
  </div>
</body>
</html>
