<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Captura de leads em caraguatatuba — Praia Digital</title>
  <style>
    :root{primary:#2563eb;bg:#f8fafc;text:#0f172a;border:#e5e7eb}
    body{font:14px/1.65 system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--text);padding:18px}
    .wrap{max-width:880px;margin:0 auto}
    input,textarea{width:100%;padding:10px;border:1px solid #e5e7eb;border-radius:12px;background:#fff;color:#0f172a;margin:6px 0 12px}
    button{background:var(--primary);color:white;border:none;padding:12px 14px;border-radius:14px;cursor:pointer;font-weight:800}
    a{color:var(--primary)}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Captura de leads em caraguatatuba</h1>
    <p>Deixe seus dados e receba opções qualificadas.</p>
    <input id="n" placeholder="Nome">
    <input id="e" placeholder="E-mail">
    <input id="w" placeholder="WhatsApp">
    <textarea id="m" placeholder="Mensagem"></textarea>
    <button onclick="enviar()">Solicitar opções</button>
    <p><a href="/praia-digital/outreach/captura-leads-por-cidade.html">Ver todas as cidades</a></p>
    <script>
      function enviar(){
        const n = document.getElementById('n').value || '';
        const e = document.getElementById('e').value || '';
        const w = document.getElementById('w').value || '';
        const m = document.getElementById('m').value || '';
        alert('Recebido: ' + n + ' / ' + e + ' / ' + w + ' / ' + m);
      }
    </script>
  </div>
</body>
</html>
