<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Captura Parceiros — Ubatuba</title>
<style>
body{font-family:Arial,Helvetica,sans-serif;background:#0d1117;color:#e6edf3;margin:0;padding:0}
.container{max-width:900px;margin:0 auto;padding:20px}
a{color:#58a6ff;text-decoration:underline}
.card{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:16px;margin:12px 0}
input,button{padding:10px;margin:6px 0;border-radius:6px;border:1px solid #30363d;background:#21262d;color:#e6edf3}
button{background:#1f6feb;color:#fff;border:none;cursor:pointer}
</style>
</head>
<body>
<div class="container">
<h1>Parceria para imobiliárias em Ubatuba</h1>
<p>Receba leads qualificados e ferramentas de IA.</p>

<div class="card">
  <h2>Solicitar parceria</h2>
  <input type="text" placeholder="Nome da imobiliária">
  <input type="text" placeholder="Seu nome">
  <input type="email" placeholder="E-mail">
  <input type="tel" placeholder="Telefone/WhatsApp">
  <button onclick="alert('Interesse registrado. Entraremos em contato.')">Quero ser parceiro</button>
</div>

<div class="card">
  <p>Ferramentas gratuitas: <a href="https://praia.digital">https://praia.digital</a></p>
  <p>Site: <a href="https://acarolmourad-commits.github.io/praia-digital/">https://acarolmourad-commits.github.io/praia-digital/</a></p>
</div>
</div>
</body>
</html>
