<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WhatsApp Outreach Playground - Praia Digital</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Noto Sans"; background: #f7f9fb; color: #1f2937; }
  .wrap { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
  .card { background: #fff; border: 1px solid #e5e7eb; border-radius: 16px; padding: 28px; margin-bottom: 24px; box-shadow: 0 2px 8px rgba(17,24,39,0.06); }
  h1 { font-size: 34px; letter-spacing: -0.5px; margin-bottom: 8px; }
  .lead { color: #6b7280; margin-bottom: 20px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; margin-top: 18px; }
  .card-lead { background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 12px; padding: 16px; }
  .card-lead strong { display: block; font-size: 16px; margin-bottom: 4px; }
  .small { font-size: 13px; color: #6b7280; }
  .btn { appearance: none; border: 0; background: #2563eb; color: white; padding: 10px 14px; border-radius: 10px; cursor: pointer; font-weight: 600; text-decoration: none; display: inline-block; margin-top: 10px; }
  .btn:hover { background: #1d4ed8; }
  select, input, textarea { width: 100%; padding: 10px 12px; border: 1px solid #d1d5db; border-radius: 10px; font-size: 14px; margin-top: 8px; }
  textarea { min-height: 90px; }
  .filters { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <h1>WhatsApp Outreach Playground</h1>
    <p class="lead">Filtre o lote por cidade, status ou score e gere uma página de envio personalizada em 1 clique.</p>
    <div class="filters">
      <div>
        <label>Cidade</label>
        <select id="cidade"><option value="">Todas</option></select>
      </div>
      <div>
        <label>Status</label>
        <select id="status"><option value="">Todos</option></select>
      </div>
      <div>
        <label>Score mínimo</label>
        <input type="number" id="score" value="0" min="0" max="100">
      </div>
      <div>
        <label>Template</label>
        <select id="template">
          <option>default</option>
          <option>followup-d3</option>
          <option>objeção-ja-tenho-ferramenta</option>
          <option>agendamento-demo</option>
        </select>
      </div>
    </div>
    <div style="margin-top: 16px;">
      <button class="btn" onclick="gerarLote()">Gerar lote personalizado</button>
      <span class="lead" id="resultado"></span>
    </div>
  </div>

  <div class="card">
    <h2>Seus templates</h2>
    <textarea id="customTemplate">Praia Digital: parceiro de IA para imobiliárias do litoral. Temos 4 ferramentas gratuitas + onboarding express. Quer que eu envie o passo a passo do piloto de 14 dias?</textarea>
  </div>

  <div class="grid" id="grid"></div>
</div>

<script>
  const TEMPLATES = {
    default: document.getElementById('customTemplate').value || '',
    'followup-d3': 'Olá, passando para acompanhar a proposta do piloto gratuito. Quer que eu envie o onboarding simplificado?',
    'objeção-ja-tenho-ferramenta': 'Entendo. A maioria dos parceiros também já usava ferramenta. A diferença é recomendação por IA + automação leve no WhatsApp. Quer um comparativo objetivo?',
    'agendamento-demo': 'Que tal uma demo de 15 minutos amanhã ou depois? Opções: 09:00, 14:00 ou 16:00.'
  };
  async function loadLeads(){
    const res = await fetch('leads-litoral-enriquecido.csv');
    const text = await res.text();
    const lines = text.split('\n');
    const headers = lines[0].split(',').map(s=>s.trim());
    return lines.slice(1).filter(Boolean).map(line=>{
      const cols = line.split(',');
      const obj={}; headers.forEach((h,i)=>obj[h]=(cols[i]||'').trim());
      return obj;
    });
  }
  function waLink(phone, text){
    const digits = phone.replace(/\\D/g,'');
    return 'https://wa.me/' + digits + '?text=' + encodeURIComponent(text);
  }
  async function init(){
    const leads = await loadLeads();
    const cidades = Array.from(new Set(leads.map(r=>r.cidade))).sort();
    const statuses = Array.from(new Set(leads.map(r=>r.status))).sort();
    const cidadeEl = document.getElementById('cidade');
    const statusEl = document.getElementById('status');
    cidades.forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c;cidadeEl.appendChild(o);});
    statuses.forEach(s=>{const o=document.createElement('option');o.value=s;o.textContent=s;statusEl.appendChild(o);});
    window.__leads = leads;
  }
  function gerarLote(){
    const leads = window.__leads || [];
    const cidade = document.getElementById('cidade').value;
    const status = document.getElementById('status').value;
    const scoreMin = parseInt(document.getElementById('score').value || '0', 10);
    const templateKey = document.getElementById('template').value;
    const custom = document.getElementById('customTemplate').value || '';
    let filtered = leads.filter(r=>{
      const phone = (r.whatsapp||'').trim();
      const s = parseInt(r._score || '0', 10);
      return phone && s >= scoreMin && (!cidade || r.cidade===cidade) && (!status || r.status===status);
    });
    filtered.sort((a,b)=>parseInt(b._score||'0')-parseInt(a._score||'0'));
    const tpl = custom || TEMPLATES[templateKey] || TEMPLATES['default'];
    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    filtered.forEach(r=>{
      const div=document.createElement('div');
      div.className='card-lead';
      div.innerHTML=`<strong>Lead ${r.id} — ${r.nome_da_imobiliaria}</strong>
        <div class="small">Contato: ${r.pessoa_de_contato} | Cidade: ${r.cidade} | Score: ${r._score}</div>
        <div class="small">Status: ${r.status}</div>
        <a class="btn" href="${waLink(r.whatsapp, tpl)}" target="_blank" rel="noopener">Abrir conversa</a>`;
      grid.appendChild(div);
    });
    document.getElementById('resultado').textContent = `Lote gerado: ${filtered.length} leads`;
  }
  init();
</script>
</body>
</html>
