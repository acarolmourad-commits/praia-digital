<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Checklist para imobiliárias parceiras — Praia Digital</title>
  <style>
    :root{primary:#2563eb;bg:#fafafa;card:#fff;border:#e5e7eb;text:#0f172a;muted:#475569}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font:14px/1.6 system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--text);padding:18px}
    .wrap{max-width:960px;margin:0 auto}
    .card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:18px;margin:14px 0}
    a{color:var(--primary);text-decoration:none}
    ul{padding-left:18px}
    li{margin:6px 0}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Checklist para parceiros</h1>
      <ul>
        <li>Enviar 1 imóvel exemplo</li>
        <li>Configurar follow-up automático</li>
        <li>Relatório mensal simples</li>
        <li>1 reunião curta de alinhamento</li>
      </ul>
      <p><a href="/praia-digital/blog/checklist-onboarding-imobiliaria-litoral-2026.html">Checklist onboarding</a></p>
    </div>
  </div>
</body>
</html>
