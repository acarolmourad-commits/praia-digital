<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Captura de Leads | Praia Digital</title>
<style>
body{font-family:Arial,sans-serif;margin:0;padding:0;background:#07112b;color:#fff}.container{max-width:880px;margin:0 auto;padding:24px}.card{background:#0e214d;border-radius:12px;padding:24px;margin-top:16px}.btn{background:#3b82f6;color:white;padding:12px 16px;border-radius:8px;border:0;cursor:pointer;font-size:16px}input,select,textarea{width:100%;padding:10px;border-radius:8px;border:1px solid #334155;background:#0b1a3a;color:#fff;margin-top:8px}
</style>
</head>
<body>
<div class="container">
  <h1>Quero receber avaliação personalizada</h1>
  <div class="card">
    <label>Nome</label>
    <input type="text" placeholder="Seu nome">
    <label>E-mail</label>
    <input type="email" placeholder="seu@email.com">
    <label>WhatsApp</label>
    <input type="text" placeholder="(DD) 00000-0000">
    <label>Cidade de interesse</label>
    <select>
      <option>Santos</option><option>Guarujá</option><option>Ubatuba</option><option>Ilhabela</option><option>Praia Grande</option><option>Bertioga</option><option>Peruíbe</option><option>Itanhaém</option>
    </select>
    <label>Perfil</label>
    <select>
      <option>Comprador</option><option>Vendedor</option><option>Investidor</option><option>Corretor</option><option>Imobiliária</option>
    </select>
    <label>Mensagem</label>
    <textarea rows="3" placeholder="Conte seu objetivo..."></textarea>
    <button class="btn" onclick="alert('Lead registrado! Entraremos em contato em até 2h.')">Enviar</button>
  </div>
  <p style="margin-top:16px"><a href="https://acarolmourad-commits.github.io/praia-digital/" style="color:#9fb3d1">Voltar para a Praia Digital</a></p>
</div>
</body>
</html>
