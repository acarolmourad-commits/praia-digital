<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerador de Posts para Redes Sociais — Praia Digital</title>
<style>
body{font-family:Arial,Helvetica,sans-serif;background:#0d1117;color:#e6edf3;margin:0;padding:0}
.container{max-width:900px;margin:0 auto;padding:20px}
a{color:#58a6ff;text-decoration:underline}
.card{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:16px;margin:12px 0}
input,select,button{padding:10px;margin:6px 2px;border-radius:6px;border:1px solid #30363d;background:#21262d;color:#e6edf3;font-size:14px}
button{background:#1f6feb;color:#fff;border:none;cursor:pointer}
.result{margin-top:12px;padding:12px;background:#21262d;border-radius:6px;display:none;white-space:pre-wrap}
.badge{display:inline-block;background:#1f6feb;color:#fff;padding:4px 8px;border-radius:999px;font-size:12px;margin:4px 6px 0 0}
</style>
</head>
<body>
<div class="container">
<h1>🎨 Gerador de Posts para Redes Sociais</h1>
<p>Gere legendas curtas para Instagram, LinkedIn e WhatsApp a partir de temas do litoral.</p>

<div class="card">
  <select id="tema">
    <option value="">Tema</option>
    <option>Avaliação de imóvel para temporada</option>
    <option>Como escolher imóvel no litoral</option>
    <option>Gestão de leads para imobiliárias</option>
    <option>Automação WhatsApp para imobiliárias</option>
    <option>Captação sem anúncios pagos</option>
    <option>Previsão de preços no litoral</option>
    <option>Gestão de temporada</option>
    <option>Onboarding de parceiros</option>
  </select>
  <select id="cidade">
    <option value="">Cidade</option>
    <option>Santos</option>
    <option>Guarujá</option>
    <option>Ubatuba</option>
    <option>Ilhabela</option>
    <option>Peruíbe</option>
    <option>Praia Grande</option>
  </select>
  <select id="canal">
    <option value="">Canal</option>
    <option>Instagram</option>
    <option>LinkedIn</option>
    <option>WhatsApp</option>
  </select>
  <button onclick="gerar()">Gerar post</button>
</div>

<div id="resultado" class="result"></div>

<div class="card">
  <h2>Acesso rápido</h2>
  <a href="docs/sales/central-comando-praia-digital.html">🧭 Central de Comando</a><br>
  <a href="https://praia.digital">🛠 Ferramentas gratuitas</a><br>
  <a href="marketing/hashtags-legendas-redes-2026.html"># Hashtags e legendas</a>
</div>
</div>

<script>
function gerar(){
  const tema=document.getElementById('tema').value;
  const cidade=document.getElementById('cidade').value;
  const canal=document.getElementById('canal').value;
  if(!tema||!cidade||!canal){
    alert('Preencha tema, cidade e canal.');
    return;
  }
  const base='🏡 '+tema+' em '+cidade+' — dica prática para 2026.';
  const whatsapp='📩 Envie este guia para um corretor ou proprietário.';
  const linkedin='🔗 Conteúdo para imobiliárias de '+cidade+'.';
  const instagram='🌊 Salve este post para usar na temporada.';
  const cta='Acesse: https://praia.digital';
  let texto='';
  if(canal==='WhatsApp') texto=base+' '+whatsapp+'\n\n'+cta;
  else if(canal==='LinkedIn') texto=base+' '+linkedin+'\n\n'+cta;
  else texto=base+' '+instagram+'\n\n'+cta;
  const r=document.getElementById('resultado');
  r.textContent=texto;
  r.style.display='block';
}
</script>
</body>
</html>
