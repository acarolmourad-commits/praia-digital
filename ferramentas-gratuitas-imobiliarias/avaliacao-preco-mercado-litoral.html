<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Avaliação de preço de mercado para imóveis no litoral paulista | Praia Digital</title>
  <meta name="description" content="Ferramenta gratuita para avaliação de preço de mercado de imóveis no litoral paulista.">
  <link rel="canonical" href="https://acarolmourad-commits.github.io/praia-digital/ferramentas-gratuitas-imobiliarias/avaliacao-preco-mercado-litoral.html">
  <style>
    :root{bg:#f8fafc;text:#0f172a;border:#e5e7eb;primary:#2563eb;secondary:#0ea5e9}
    body{font:14px/1.6 system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--text);padding:18px}
    .wrap{max-width:880px;margin:0 auto}
    a{color:var(--primary)}
    label{display:block;margin:10px 0 4px}
    input,select,textarea{width:100%;padding:10px;border:1px solid #e5e7eb;border-radius:12px;background:#fff;color:#0f172a}
    button{background:var(--primary);color:white;border:none;padding:12px 14px;border-radius:14px;margin-top:12px;cursor:pointer;font-weight:800}
    .result{background:#f1f5f9;border:1px solid #e5e7eb;border-radius:12px;padding:14px;margin-top:12px;display:none}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Avaliação de preço de mercado</h1>
    <p>Preencha os dados abaixo para receber uma faixa de referência.</p>
    <form onsubmit="event.preventDefault();this.querySelector('.result').style.display='block';this.querySelector('.result').textContent='Faixa estimada: '+((parseInt(this.area.value||0)*8500)+(parseInt(this.quartos.value||0)*12000))+'. Use esta base com um profissional local. ';">
      <label>Tipo</label>
      <select name="tipo">
        <option>Apartamento</option><option>Casa</option><option>Cobertura</option><option>Studio</option><option>Sobrado</option>
      </select>
      <label>Cidade</label>
      <select name="cidade">
        <option>Praia Grande</option><option>Caraguatatuba</option><option>Ilhabela</option><option>Ubatuba</option><option>São Sebastião</option><option>Bertioga</option><option>Maresias</option><option>Guarujá</option><option>Iguape</option><option>Cananéia</option>
      </select>
      <label>Área útil</label>
      <input name="area" type="number" placeholder="Ex: 98">
      <label>Quartos</label>
      <input name="quartos" type="number" placeholder="Ex: 3">
      <label>Observações</label>
      <textarea name="obs" placeholder="Ex: vista mar, condomínio, reforma..."></textarea>
      <button type="submit">Calcular faixa estimada</button>
    </form>
    <div class="result"></div>
    <p><a href="/praia-digital/imoveis/parcerias-litoral-paulista.html">Quero uma avaliação profissional completa</a></p>
  </div>
</body>
</html>
