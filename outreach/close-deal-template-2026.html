<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Template de fechamento — Praia Digital</title>
  <style>
    :root{primary:#2563eb;bg:#fafafa;card:#fff;border:#e5e7eb;text:#0f172a;muted:#475569}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font:14px/1.6 system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--text);padding:18px}
    .wrap{max-width:960px;margin:0 auto}
    .card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:18px;margin:14px 0}
    a{color:var(--primary);text-decoration:none}
    pre{background:#f1f5f9;border:1px solid #e5e7eb;border-radius:12px;padding:14px;overflow:auto}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Template de fechamento</h1>
      <p>Use quando o lead demonstrar intenção.</p>
      <h3>E-mail</h3>
      <pre>Olá [Nome], ótimo retorno. Para fecharmos: 1) envio do onboarding; 2) acesso à ferramenta; 3) relatório simples no dia 7. Quer seguir com o piloto de 30 dias?</pre>
      <p><a href="/praia-digital/outreach/proposta-comercial-padrao-2026.html">Proposta padrão</a></p>
    </div>
  </div>
</body>
</html>
