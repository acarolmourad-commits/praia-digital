<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Priorização de leads com IA | Praia Digital</title><meta name="description" content="Priorize leads automaticamente com IA para corretores e imobiliárias no litoral paulista."><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Segoe UI',system-ui,sans-serif;background:#F4EBD0;color:#023047;line-height:1.6}header{background:linear-gradient(135deg,#0077B6,#00B4D8);color:#fff;padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between}.logo{font-weight:700;text-decoration:none;color:#fff}.hero{background:linear-gradient(180deg,#0077B6,#00B4D8 60%,#90E0EF);color:#fff;text-align:center;padding:3rem 2rem 1.5rem}.hero h1{font-size:clamp(1.6rem,4vw,2.6rem);font-weight:800;margin-bottom:.75rem}.hero p{opacity:.95;max-width:720px;margin:0 auto 1.5rem}.btn{background:#fff;color:#0077B6;padding:.7rem 1.4rem;border-radius:999px;text-decoration:none;font-weight:700}.card{max-width:920px;margin:2rem auto;padding:1.75rem;background:#fff;border-radius:16px;box-shadow:0 8px 28px rgba(0,0,0,.06)}.card h2{font-size:1.25rem;margin-bottom:.6rem}.card p{color:#334155;margin-bottom:.6rem}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:1rem;max-width:920px;margin:0 auto 2rem;padding:0 2rem}.card-item{background:#fff;padding:1.25rem;border-radius:14px;border:1px solid #e5e7eb}footer{background:#023047;color:#fff;text-align:center;padding:1rem;font-size:.85rem;opacity:.7;margin-top:2rem}a{color:#0077B6}.form-row{margin:.5rem 0}.form-row label{display:block;font-weight:600;margin-bottom:.25rem}.form-row input,.form-row select,.form-row textarea{width:100%;padding:.6rem;border:1px solid #cbd5e1;border-radius:8px}.result{margin-top:1rem;padding:1rem;background:#e0f2fe;border-radius:12px;border:1px solid #bae6fd}.error{color:#dc2626}</style></head><body><header><a class="logo" href="/">🌊 Praia Digital</a><nav><a href="/assets/" style="color:#fff;text-decoration:none;font-weight:600">Serviços</a></nav></header><div class="hero"><h1>Priorização de leads com IA</h1><p>Classifique leads por temperatura, intenção e cidade para focar no que converte mais.</p><a class="btn" href="https://praia.digital">Começar grátis</a></div><div class="card"><h2>Classificação inteligente</h2><div class="form-row"><label>Origem</label><select id="origem"><option value="">Selecione</option><option>Website</option><option>Instagram</option><option>Google Maps</option><option>Indicação</option><option>WhatsApp</option></select></div><div class="form-row"><label>Tempo de resposta (min)</label><input id="tempo" type="number" placeholder="Ex: 15"></div><div class="form-row"><label>Interações anteriores</label><input id="interacoes" type="number" placeholder="Ex: 3"></div><button class="btn" onclick="priorizar()">Priorizar lead</button><div id="resultado" class="result" style="display:none"></div></div><script>function priorizar(){const origem=document.getElementById('origem').value;const tempo=parseInt(document.getElementById('tempo').value);const interacoes=parseInt(document.getElementById('interacoes').value);const el=document.getElementById('resultado');if(!origem||isNaN(tempo)||isNaN(interacoes)){el.innerHTML='<p class=\"error\">Preencha todos os campos.</p>';el.style.display='block';return}let score=interacoes*12;score+=tempo<30?20:tempo<60?10:0;score+=origem==='Indicação'?25:origem==='WhatsApp'?18:origem==='Google Maps'?15:10;let temperatura='Fria';let acao='Nutrição por conteúdo + follow-up em 7 dias.';if(score>=60){temperatura='Quente';acao='Call em até 24h + proposta comercial.';}else if(score>=35){temperatura='Morna';acao='Follow-up 3h + envio de imóveis parecidos.';}el.innerHTML=`<h3>Resultado</h3><p><strong>Score:</strong> ${score}</p><p><strong>Temperatura:</strong> ${temperatura}</p><p><strong>Ação recomendada:</strong> ${acao}</p>`;el.style.display='block'}</script><footer>© Praia Digital — 2026 — IA para imóveis no litoral paulista</footer><form id="integrated-form" autocomplete="off">
  <div class="form-row"><label>Origem</label>
            <select name="origem" id="field-origem">
              <option value="WhatsApp">WhatsApp</option>
            <option value="Indicação">Indicação</option>
            <option value="WhatsApp">WhatsApp</option>
            <option value="Google Maps">Google Maps</option>
            <option value="Site">Site</option>
            <option value="Instagram">Instagram</option>
            </select>
  </div>
  <div class="form-row"><label>Tempo Resposta</label>
            <input type="number" name="tempo_resposta" id="field-tempo_resposta" value="15"/>
  </div>
  <div class="form-row"><label>Interacoes</label>
            <input type="number" name="interacoes" id="field-interacoes" value="3"/>
  </div>
  <button class="btn" type="submit" id="btn-run">Priorizar lead</button>
</form>
<div id="out-priorizacao-leads-ia" class="result" style="margin-top:1rem;">Resultado da IA aparecerá aqui após o envio.</div>
<script>
(function(){
  const API_BASE = 'http://localhost:8000';
  const ENDPOINT = '/priorizar';
  const OUTPUT_ID = 'out-priorizacao-leads-ia';
  const FIELDS = ["origem","tempo_resposta","interacoes"];
  function run(){
    const out = document.getElementById(OUTPUT_ID);
    if(out) out.textContent = 'Processando...';
    const payload = {};
    FIELDS.forEach(function(k){
      var el = document.getElementById('field-' + k) || document.querySelector('[name="' + k + '"]');
      if(el){ payload[k] = isNaN(Number(el.value)) ? el.value : Number(el.value); }
    });
    fetch(API_BASE + ENDPOINT, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(payload)
    })
    .then(function(res){ return res.json(); })
    .then(function(data){
      if(out) out.textContent = JSON.stringify(data, null, 2);
    })
    .catch(function(err){
      if(out) out.textContent = 'Erro: ' + err.message;
    });
  }
  var form = document.getElementById('integrated-form');
  if(form){ form.addEventListener('submit', function(e){ e.preventDefault(); run(); }); }
  var btn = document.getElementById('btn-run');
  if(btn){ btn.addEventListener('click', run); }
})();
</script>
</body></html>
