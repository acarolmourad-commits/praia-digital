<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Avaliação automática de preço de imóveis no litoral | Praia Digital</title><meta name="description" content="Avalie preços de imóveis no litoral paulista automaticamente com IA: comparativos, faixas e histórico por cidade e bairro."><link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💲</text></svg>"><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Segoe UI',system-ui,sans-serif;background:#F4EBD0;color:#023047;line-height:1.6}header{background:linear-gradient(135deg,#0077B6,#00B4D8);color:#fff;padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between}.logo{font-weight:700;text-decoration:none;color:#fff}.hero{background:linear-gradient(180deg,#0077B6,#00B4D8 60%,#90E0EF);color:#fff;text-align:center;padding:3rem 2rem 1.5rem}.hero h1{font-size:clamp(1.6rem,4vw,2.6rem);font-weight:800;margin-bottom:.75rem}.hero p{opacity:.95;max-width:720px;margin:0 auto 1.5rem}.btn{background:#fff;color:#0077B6;padding:.7rem 1.4rem;border-radius:999px;text-decoration:none;font-weight:700}.card{max-width:920px;margin:2rem auto;padding:1.75rem;background:#fff;border-radius:16px;box-shadow:0 8px 28px rgba(0,0,0,.06)}.card h2{font-size:1.25rem;margin-bottom:.6rem}.card p{color:#334155;margin-bottom:.6rem}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:1rem;max-width:920px;margin:0 auto 2rem;padding:0 2rem}.card-item{background:#fff;padding:1.25rem;border-radius:14px;border:1px solid #e5e7eb}footer{background:#023047;color:#fff;text-align:center;padding:1rem;font-size:.85rem;opacity:.7;margin-top:2rem}a{color:#0077B6}.form-row{margin:.5rem 0}.form-row label{display:block;font-weight:600;margin-bottom:.25rem}.form-row input,.form-row select{width:100%;padding:.6rem;border:1px solid #cbd5e1;border-radius:8px}.result{margin-top:1rem;padding:1rem;background:#e0f2fe;border-radius:12px;border:1px solid #bae6fd}.error{color:#dc2626}</style></head><body><header><a class="logo" href="/">🌊 Praia Digital</a><nav><a href="/assets/" style="color:#fff;text-decoration:none;font-weight:600">Serviços</a></nav></header><div class="hero"><h1>Avaliação automática de preço de imóveis no litoral</h1><p>Compare faixas de preço, histórico e potencial de valorização por cidade e bairro.</p><a class="btn" href="https://praia.digital">Começar grátis</a></div><div class="card"><h2>Simulação inteligente</h2><div class="form-row"><label>Cidade</label><select id="cidade"><option value="">Selecione</option><option>Santos</option><option>Guarujá</option><option>Praia Grande</option><option>São Vicente</option><option>Bertioga</option><option>Itanhaém</option><option>Peruíbe</option><option>Mongaguá</option></select></div><div class="form-row"><label>Tipo</label><select id="tipo"><option value="">Selecione</option><option>Apartamento</option><option>Casa</option><option>Cobertura</option><option>Flat</option></select></div><div class="form-row"><label>Área (m²)</label><input id="area" type="number" placeholder="Ex: 75"></div><div class="form-row"><label>Quartos</label><input id="quartos" type="number" placeholder="Ex: 2"></div><button class="btn" onclick="avaliar()">Avaliar preço sugerido</button><div id="resultado" class="result" style="display:none"></div></div><script>function avaliar(){const cidade=document.getElementById('cidade').value;const tipo=document.getElementById('tipo').value;const area=parseFloat(document.getElementById('area').value);const quartos=parseInt(document.getElementById('quartos').value);const el=document.getElementById('resultado');if(!cidade||!tipo||!area||!quartos){el.innerHTML='<p class=\"error\">Preencha todos os campos.</p>';el.style.display='block';return}const basePorM2={Santos:7200,Guarujá:6800,Praia Grande:5400,São Vicente:4800,Bertioga:5100,Itanhaém:4600,Peruíbe:4200,Mongaguá:4400};const fatorTipo={Apartamento:1, Casa:1.15, Cobertura:1.35, Flat:1.1};const base=basePorM2[cidade]||5000;const fator=fatorTipo[tipo]||1;const faixaMin=base*area*0.9*fator;const faixaMax=base*area*1.15*fator;const sugestao=((faixaMin+faixaMax)/2).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});el.innerHTML=`<h3>Faixa sugerida em ${cidade}</h3><p><strong>Sugestão:</strong> ${sugestao}</p><p><strong>Faixa:</strong> ${faixaMin.toLocaleString('pt-BR',{style:'currency',currency:'BRL'})} – ${faixaMax.toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}</p><p><small>* Estimativa baseada em faixas médias por cidade e tipo. Use como referência inicial.</small></p>`;el.style.display='block'}</script><footer>© Praia Digital — 2026 — IA para imóveis no litoral paulista</footer></body></html>
