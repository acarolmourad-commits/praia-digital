<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Geração de descrições de anúncios com IA | Praia Digital</title><meta name="description" content="Gere descrições persuasivas para anúncios de imóveis no litoral usando IA. Pronto para WhatsApp, portais e redes sociais."><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Segoe UI',system-ui,sans-serif;background:#F4EBD0;color:#023047;line-height:1.6}header{background:linear-gradient(135deg,#0077B6,#00B4D8);color:#fff;padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between}.logo{font-weight:700;text-decoration:none;color:#fff}.hero{background:linear-gradient(180deg,#0077B6,#00B4D8 60%,#90E0EF);color:#fff;text-align:center;padding:3rem 2rem 1.5rem}.hero h1{font-size:clamp(1.6rem,4vw,2.6rem);font-weight:800;margin-bottom:.75rem}.hero p{opacity:.95;max-width:720px;margin:0 auto 1.5rem}.btn{background:#fff;color:#0077B6;padding:.7rem 1.4rem;border-radius:999px;text-decoration:none;font-weight:700}.card{max-width:920px;margin:2rem auto;padding:1.75rem;background:#fff;border-radius:16px;box-shadow:0 8px 28px rgba(0,0,0,.06)}.card h2{font-size:1.25rem;margin-bottom:.6rem}.card p{color:#334155;margin-bottom:.6rem}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:1rem;max-width:920px;margin:0 auto 2rem;padding:0 2rem}.card-item{background:#fff;padding:1.25rem;border-radius:14px;border:1px solid #e5e7eb}footer{background:#023047;color:#fff;text-align:center;padding:1rem;font-size:.85rem;opacity:.7;margin-top:2rem}a{color:#0077B6}.form-row{margin:.5rem 0}.form-row label{display:block;font-weight:600;margin-bottom:.25rem}.form-row input,.form-row select,.form-row textarea{width:100%;padding:.6rem;border:1px solid #cbd5e1;border-radius:8px}.result{margin-top:1rem;padding:1rem;background:#e0f2fe;border-radius:12px;border:1px solid #bae6fd}.error{color:#dc2626}</style></head><body><header><a class="logo" href="/">🌊 Praia Digital</a><nav><a href="/assets/" style="color:#fff;text-decoration:none;font-weight:600">Serviços</a></nav></header><div class="hero"><h1>Geração de descrições de anúncios com IA</h1><p>Crie descrições persuasivas para anúncios de imóveis no litoral em segundos.</p><a class="btn" href="https://praia.digital">Começar grátis</a></div><div class="card"><h2>Gerador inteligente</h2><div class="form-row"><label>Tipo de imóvel</label><select id="tipo"><option value="">Selecione</option><option>Apartamento</option><option>Casa</option><option>Cobertura</option><option>Flat</option></select></div><div class="form-row"><label>Cidade</label><select id="cidade"><option value="">Selecione</option><option>Santos</option><option>Guarujá</option><option>Praia Grande</option><option>São Vicente</option><option>Bertioga</option><option>Itanhaém</option><option>Peruíbe</option><option>Mongaguá</option></select></div><div class="form-row"><label>Diferenciais</label><textarea id="diffs" rows="3" placeholder="Ex: vista mar, piscina, churrasqueira, perto da praia"></textarea></div><button class="btn" onclick="gerar()">Gerar descrição</button><div id="resultado" class="result" style="display:none"></div></div><script>function gerar(){const tipo=document.getElementById('tipo').value;const cidade=document.getElementById('cidade').value;const diffs=document.getElementById('diffs').value.trim();const el=document.getElementById('resultado');if(!tipo||!cidade||!diffs){el.innerHTML='<p class=\"error\">Preencha todos os campos.</p>';el.style.display='block';return}const lista=diffs.split(',').map(x=>x.trim()).filter(Boolean);const intro=`Confortoso ${tipo.toLowerCase()} em ${cidade}, ideal para temporada e moradia.`;const destaque=lista.length?` Destaques: ${lista.join(', ')}.`:'';const fechamento='Agende uma visita e conheça pessoalmente.';const texto=[intro,destaque,fechamento].filter(Boolean).join('');el.innerHTML=`<h3>Descrição sugerida</h3><p>${texto}</p><button class="btn" onclick="navigator.clipboard.writeText(\`${texto.replace(/`/g,'')}\`)">Copiar</button>`;el.style.display='block'}</script><footer>© Praia Digital — 2026 — IA para imóveis no litoral paulista</footer></body></html>
