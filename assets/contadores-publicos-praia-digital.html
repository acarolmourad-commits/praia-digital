<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contadores públicos — Praia Digital</title>
  <style>
    .counters{display:flex;gap:1rem;flex-wrap:wrap;justify-content:center;padding:2rem;}
    .counter-box{background:#fff;border-radius:16px;padding:1.5rem;text-align:center;min-width:140px;box-shadow:0 2px 12px rgba(0,0,0,0.08);}
    .counter-value{font-size:2rem;font-weight:800;color:#0077B6;}
    .counter-label{font-size:0.85rem;color:#666;margin-top:0.25rem;}
  </style>
</head>
<body>
  <h1 style="text-align:center;">Resultados públicos</h1>
  <div class="counters">
    <div class="counter-box"><div class="counter-value">34</div><div class="counter-label">Imóveis cadastrados</div></div>
    <div class="counter-box"><div class="counter-value">38</div><div class="counter-label">Contatos esta semana</div></div>
    <div class="counter-box"><div class="counter-value">5</div><div class="counter-label">Cases de sucesso</div></div>
    <div class="counter-box"><div class="counter-value">120</div><div class="counter-label">Leads qualificados</div></div>
  </div>
</body>
</html>
