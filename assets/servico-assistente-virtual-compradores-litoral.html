<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Assistente virtual para compradores de imóveis no litoral | Praia Digital</title><meta name="description" content="Assistente virtual para compradores no litoral paulista: dúvidas, roteiro de visita e follow-up automático."><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Segoe UI',system-ui,sans-serif;background:#F4EBD0;color:#023047;line-height:1.6}header{background:linear-gradient(135deg,#0077B6,#00B4D8);color:#fff;padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between}.logo{font-weight:700;text-decoration:none;color:#fff}.hero{background:linear-gradient(180deg,#0077B6,#00B4D8 60%,#90E0EF);color:#fff;text-align:center;padding:3rem 2rem 1.5rem}.hero h1{font-size:clamp(1.6rem,4vw,2.6rem);font-weight:800;margin-bottom:.75rem}.hero p{opacity:.95;max-width:720px;margin:0 auto 1.5rem}.btn{background:#fff;color:#0077B6;padding:.7rem 1.4rem;border-radius:999px;text-decoration:none;font-weight:700}.card{max-width:920px;margin:2rem auto;padding:1.75rem;background:#fff;border-radius:16px;box-shadow:0 8px 28px rgba(0,0,0,.06)}.card h2{font-size:1.25rem;margin-bottom:.6rem}.card p{color:#334155;margin-bottom:.6rem}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:1rem;max-width:920px;margin:0 auto 2rem;padding:0 2rem}.card-item{background:#fff;padding:1.25rem;border-radius:14px;border:1px solid #e5e7eb}footer{background:#023047;color:#fff;text-align:center;padding:1rem;font-size:.85rem;opacity:.7;margin-top:2rem}a{color:#0077B6}.form-row{margin:.5rem 0}.form-row label{display:block;font-weight:600;margin-bottom:.25rem}.form-row input,.form-row select,.form-row textarea{width:100%;padding:.6rem;border:1px solid #cbd5e1;border-radius:8px}.result{margin-top:1rem;padding:1rem;background:#e0f2fe;border-radius:12px;border:1px solid #bae6fd}.error{color:#dc2626}</style></head><body><header><a class="logo" href="/">🌊 Praia Digital</a><nav><a href="/assets/" style="color:#fff;text-decoration:none;font-weight:600">Serviços</a></nav></header><div class="hero"><h1>Assistente virtual para compradores</h1><p>Tire dúvidas, receba um roteiro de visita e acompanhe o follow-up automaticamente.</p><a class="btn" href="https://praia.digital">Começar grátis</a></div><div class="card"><h2>Assistente consultivo</h2><div class="form-row"><label>Cidade de interesse</label><select id="cidade"><option value="">Selecione</option><option>Santos</option><option>Guarujá</option><option>Praia Grande</option><option>São Vicente</option><option>Bertioga</option><option>Itanhaém</option><option>Peruíbe</option><option>Mongaguá</option></select></div><div class="form-row"><label>Objetivo</label><select id="objetivo"><option value="">Selecione</option><option>Comprar</option><option>Alugar temporada</option><option>Investir</option></select></div><div class="form-row"><label>Perfil</label><select id="perfil"><option value="">Selecione</option><option>Família</option><option>Casal</option><option>Solteiro</option><option>Trabalho remoto</option></select></div><button class="btn" onclick="sugerir()">Obter roteiro</button><div id="resultado" class="result" style="display:none"></div></div><script>function sugerir(){const cidade=document.getElementById('cidade').value;const objetivo=document.getElementById('objetivo').value;const perfil=document.getElementById('perfil').value;const el=document.getElementById('resultado');if(!cidade||!objetivo||!perfil){el.innerHTML='<p class=\"error\">Preencha todos os campos.</p>';el.style.display='block';return}bairros={Santos:'Gonzaga, Ponta da Praia, Embaré',Guarujá:'Enseada, Guarujá Centro, Tombo',Praia Grande:'Boqueirão, Caiçara, Vila Tupi',São Vicente:'Catiapoã, Jardim Rio Branco',Bertioga:'Riviera de São Lourenço',Itanhaém:'Centro, Itanhaém Norte, Suarão',Peruíbe:'Barra de Peruíbe, Centro',Mongaguá:'Mongaguá Centro, Balneário <div id="result-servico-assistente-virtual-compradores-litoral" class="result">Resultado</div><script>async function run(){const out=document.getElementById("result-servico-assistente-virtual-compradores-litoral");out.textContent="Processando...";const payload={};document.querySelectorAll("#integrated-form [name]").forEach(el=>{const n=el.getAttribute("name");payload[n]=isNaN(Number(el.value))?el.value:Number(el.value);});const e=await fetch("http://127.0.0.1:8000/avaliar",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)});const d=await e.json();out.textContent=JSON.stringify(d,null,2)}document.getElementById("integrated-form").addEventListener("submit",function(e){e.preventDefault();run()});document.getElementById("b-run")?.addEventListener("click",run);</script></body>
