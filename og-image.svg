      <stop offset="0%" style="stop-color:#0077B6"/>
      <stop offset="50%" style="stop-color:#00B4D8"/>
      <stop offset="100%" style="stop-color:#90E0EF"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Waves -->
  <path d="M0 380 Q300 320 600 380 Q900 440 1200 380 L1200 630 L0 630 Z" fill="rgba(255,255,255,0.1)"/>
  <path d="M0 420 Q300 360 600 420 Q900 480 1200 420 L1200 630 L0 630 Z" fill="rgba(255,255,255,0.08)"/>
