  <text x="600" y="370" font-family="Arial, sans-serif" font-size="32" fill="rgba(255,255,255,0.9)" text-anchor="middle">Imóveis no Litoral Brasileiro</text>
  <text x="600" y="430" font-family="Arial, sans-serif" font-size="24" fill="rgba(255,255,255,0.75)" text-anchor="middle">Praia Grande • Santos • Guarujá • São Vicente • Itanhaém • Mongaguá • Peruíbe</text>
  <!-- Wave bottom -->
